name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-simulation:
    name: Build simulation (C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            libsdl2-dev libsdl2-ttf-dev libglew-dev \
            mesa-common-dev libgl1-mesa-dev libosmesa6-dev \
            xvfb mesa-utils

      - name: Configure
        run: cmake -B build -S simulation -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ./build/3d_fluid_simulation_car --help

      - name: LBM unit tests
        run: |
          export MESA_GL_VERSION_OVERRIDE=4.3
          export LIBGL_ALWAYS_SOFTWARE=1
          cd simulation
          xvfb-run ../build/test_lbm

      - name: Integration test
        run: |
          export MESA_GL_VERSION_OVERRIDE=4.3
          export LIBGL_ALWAYS_SOFTWARE=1
          cd simulation
          xvfb-run bash test/test_integration.sh

  build-website:
    name: Build website (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
