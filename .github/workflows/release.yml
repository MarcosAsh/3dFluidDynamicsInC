name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            libsdl2-dev libsdl2-ttf-dev \
            mesa-common-dev libgl1-mesa-dev libosmesa6-dev \
            libegl1-mesa-dev xvfb mesa-utils

      - name: Configure
        run: cmake -B build -S simulation -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: |
          export MESA_GL_VERSION_OVERRIDE=4.3
          export LIBGL_ALWAYS_SOFTWARE=1
          export USE_EGL=0
          cd simulation
          xvfb-run ../build/test_lbm

      - name: Package
        run: |
          mkdir -p lattice-${{ github.ref_name }}
          cp build/3d_fluid_simulation_car lattice-${{ github.ref_name }}/
          cp -r simulation/shaders lattice-${{ github.ref_name }}/
          cp -r simulation/assets lattice-${{ github.ref_name }}/
          cp README.md LICENSE lattice-${{ github.ref_name }}/
          tar czf lattice-${{ github.ref_name }}-linux-x86_64.tar.gz \
            lattice-${{ github.ref_name }}/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: lattice-*.tar.gz
